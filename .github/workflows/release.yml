name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts without creating a GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
          - platform: macos
            arch: amd64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
          - platform: windows
            arch: amd64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc

    env:
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.arch }}
          workspaces: src/frontend/src-tauri

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: src/backend/.python-version

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: src/backend
        run: uv sync --extra dev

      - name: Generate shared API types
        run: pnpm gen:api

      - name: Build shared package
        run: pnpm build:shared

      - name: Build backend bundle
        run: pnpm build:backend

      - name: Build frontend (Tauri bundle)
        run: pnpm --filter @rosser/frontend build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src/frontend/src-tauri/target/release/bundle/dmg/*.dmg
            src/frontend/src-tauri/target/release/bundle/nsis/*.exe
            src/frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Rosser v${{ steps.version.outputs.version }}
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
