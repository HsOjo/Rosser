services:
  rosser:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ROSSER_TOKEN=${ROSSER_TOKEN:-change-me}
      - ROSSER_CORS_ORIGINS=${ROSSER_CORS_ORIGINS:-}
      - ROSSER_STORAGE_DIR=/app/storage
      - ROSSER_DATA_DIR=/app/data
    volumes:
      - rosser-data:/app/data
      - rosser-storage:/app/storage
    restart: unless-stopped

volumes:
  rosser-data:
  rosser-storage:
